kind = "web"
previewPath = "/"
title = "RAPID Crisis Response"
version = "1.0.0"
id = "artifacts/rapid"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20207

[services.development]
run = "pnpm --filter @workspace/rapid run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rapid", "run", "build" ]
publicDir = "artifacts/rapid/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20207"
BASE_PATH = "/"
